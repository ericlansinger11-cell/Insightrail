<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀 InsightRail - Pro Trading Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .light-mode {
      background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
      color: #111827;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .light-mode .header,
    .light-mode .stock-card,
    .light-mode .chart-panel,
    .light-mode .news-panel {
      background: rgba(255,255,255,0.7);
      color: #111827;
    }

    .controls {
      text-align: center;
      margin-bottom: 30px;
    }

    button {
      background: linear-gradient(45deg, #3b82f6, #1d4ed8);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      margin: 0 10px;
      transition: all 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59,130,246,0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .stock-card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
      cursor: pointer;
    }

    .stock-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .stock-card.active {
      outline: 2px solid rgba(96,165,250,0.9);
    }

    .buy { border-left: 5px solid #4ade80; }
    .hold { border-left: 5px solid #facc15; }
    .sell { border-left: 5px solid #ef4444; }

    .ticker {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .price {
      font-size: 32px;
      font-weight: 800;
      margin: 10px 0;
    }

    .confidence {
      background: rgba(96,165,250,0.2);
      color: #60a5fa;
      padding: 8px 16px;
      border-radius: 25px;
      display: inline-block;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .meta {
      margin-top: 10px;
      font-size: 15px;
      opacity: 0.9;
    }

    .reasons {
      margin-top: 15px;
    }

    .reason {
      margin: 5px 0;
      font-size: 14px;
    }

    .chart-panel, .news-panel {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.1);
      margin-top: 20px;
    }

    .chart-title, .news-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .chart-container {
      height: 320px;
      border-radius: 12px;
      background: rgba(0,0,0,0.25);
      padding: 10px;
    }

    .news-summary {
      font-size: 16px;
      margin-bottom: 16px;
      opacity: 0.95;
    }

    .news-item {
      padding: 14px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .news-item:first-of-type {
      border-top: none;
    }

    .news-link {
      color: inherit;
      text-decoration: none;
      font-weight: 600;
      line-height: 1.4;
    }

    .news-link:hover {
      text-decoration: underline;
    }

    .news-meta {
      margin-top: 6px;
      font-size: 13px;
      opacity: 0.75;
    }

    .sentiment-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 8px;
    }

    .sentiment-positive {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }

    .sentiment-negative {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .sentiment-neutral {
      background: rgba(250, 204, 21, 0.2);
      color: #facc15;
    }

    .error-card {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 20px;
      padding: 20px;
    }

    .loading {
      text-align: center;
      padding: 50px;
      font-size: 18px;
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      body { padding: 10px; }
      .portfolio-grid { grid-template-columns: 1fr; }
      .ticker { font-size: 24px; }
      .price { font-size: 28px; }
      button {
        display: block;
        width: 100%;
        margin: 10px 0;
      }
    }
  </style>
</head>
<body>
  <div class="header" style="margin-bottom:0;">
    <h1 style="font-family:'Orbitron',sans-serif;font-size:2.7rem;letter-spacing:2px;text-shadow:0 2px 24px #3b82f6,0 0 2px #fff;">🚀 InsightRail</h1>
    <p style="font-size:1.25rem;opacity:0.93;letter-spacing:1px;">Futuristic AI Trading Dashboard</p>
  </div>

  <div id="landing" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:55vh;text-align:center;">
    <h2 style="font-family:'Orbitron',sans-serif;font-size:2.1rem;margin-bottom:18px;color:#60a5fa;text-shadow:0 2px 16px #1e293b;">Welcome to InsightRail</h2>
    <p style="font-size:1.15rem;max-width:480px;margin-bottom:32px;opacity:0.92;">Your gateway to live stock analytics, AI-powered news sentiment, and beautiful charts. Start by searching for a stock ticker above.</p>
    <div style="margin-top:18px;">
      <span style="font-size:1.5rem;color:#3b82f6;">🔍</span>
      <span style="font-size:1.1rem;color:#94a3b8;">Type a ticker in the search bar to begin</span>
    </div>
  </div>

  <div class="controls" style="display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; margin-bottom:36px;">
    <button id="refreshBtn" onclick="refreshSelectedStock()">🔄 Refresh Ratings</button>
    <button onclick="toggleTheme()">🌙 Dark/Light</button>
    <div style="position:relative; min-width:220px;">
      <input id="stockSearch" type="text" placeholder="Search stocks..." autocomplete="off" style="padding:10px 16px; border-radius:10px; border:1px solid #e5e7eb; font-size:16px; min-width:180px; box-shadow:0 2px 8px rgba(0,0,0,0.06); outline:none; transition:box-shadow 0.2s;" oninput="showSuggestions()" onfocus="showSuggestions()" onblur="setTimeout(hideSuggestions, 150)">
      <ul id="suggestions" style="position:absolute; left:0; right:0; top:44px; background:#18181b; color:#fff; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.13); z-index:10; list-style:none; margin:0; padding:0; display:none; max-height:220px; overflow-y:auto;"></ul>
    </div>
  </div>
  <div id="portfolio" style="display:none;"></div>
  <div id="chartArea" style="display:none;"></div>
  <div id="newsArea" style="display:none;"></div>

  <script>
    let isLoading = false;
    let chartInstance = null;
    let isDark = true;
    let selectedTicker = null;
    let dashboardData = null;

    // --- Autocomplete Search Bar ---
    const STOCKS = [
      "AAPL", "MSFT", "SPY", "TSLA", "NVDA", "AMZN", "GOOGL", "META", "NFLX", "AMD"
    ];
    function showSuggestions() {
      const input = document.getElementById('stockSearch');
      const ul = document.getElementById('suggestions');
      const val = input.value.trim().toUpperCase();
      ul.innerHTML = '';
      if (!val) {
        ul.style.display = 'none';
        return;
      }
      const matches = STOCKS.filter(ticker => ticker.startsWith(val));
      if (matches.length === 0) {
        ul.style.display = 'none';
        return;
      }
      matches.forEach(ticker => {
        const li = document.createElement('li');
        li.textContent = ticker;
        li.style.padding = '10px 18px';
        li.style.cursor = 'pointer';
        li.style.fontWeight = '600';
        li.onmousedown = () => {
          input.value = ticker;
          ul.style.display = 'none';
          showChart(ticker);
        };
        li.onmouseover = () => li.style.background = '#27272a';
        li.onmouseout = () => li.style.background = 'none';
        ul.appendChild(li);
      });
      ul.style.display = 'block';
    }
    function hideSuggestions() {
      document.getElementById('suggestions').style.display = 'none';
    }

    async function loadDashboard() {
      try {
        if (!selectedTicker) return null;
        const res = await fetch(`/api/dashboard?ticker=${selectedTicker}`);
        return await res.json();
      } catch (e) {
        return null;
      }
    }

    async function loadChart(ticker) {
      try {
        const res = await fetch(`/api/chart/${ticker}`);
        return await res.json();
      } catch (e) {
        return { error: 'Chart failed to load' };
      }
    }

    async function loadNews(ticker) {
      try {
        const res = await fetch(`/api/news/${ticker}`);
        return await res.json();
      } catch (e) {
        return { error: 'News failed to load' };
      }
    }

    function getChartColors() {
      const light = document.body.classList.contains('light-mode');
      return {
        text: light ? '#111827' : 'rgba(255,255,255,0.75)',
        grid: light ? 'rgba(17,24,39,0.08)' : 'rgba(255,255,255,0.08)'
      };
    }

    function createChart(ticker, canvas, labels, prices, ratingClass) {
      const ctx = canvas.getContext('2d');

      if (chartInstance) {
        chartInstance.destroy();
      }

      const colors = getChartColors();

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: prices,
            borderColor:
              ratingClass === 'buy'
                ? '#4ade80'
                : ratingClass === 'sell'
                ? '#ef4444'
                : '#facc15',
            borderWidth: 3,
            tension: 0.35,
            fill: false,
            pointRadius: 3,
            pointHoverRadius: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              ticks: { color: colors.text },
              grid: { color: colors.grid }
            },
            x: {
              ticks: { color: colors.text },
              grid: { color: colors.grid }
            }
          }
        }
      });
    }

    function sentimentClass(label) {
      if (label === 'Positive') return 'sentiment-positive';
      if (label === 'Negative') return 'sentiment-negative';
      return 'sentiment-neutral';
    }


    async function showChart(ticker) {
      // Hide landing, show panels
      document.getElementById('landing').style.display = 'none';
      document.getElementById('portfolio').style.display = 'block';
      document.getElementById('chartArea').style.display = 'block';
      document.getElementById('newsArea').style.display = 'block';
      selectedTicker = ticker;
      await showChartWithRange(ticker, '7d');
      await showNews(ticker);
      await loadPortfolio();
    }

    // Helper to show chart with a specific range
    async function showChartWithRange(ticker, range) {
      selectedTicker = ticker;
      // Fetch chart data for the selected range
      let chartData;
      try {
        const res = await fetch(`/api/chart/${ticker}?range=${range}`);
        chartData = await res.json();
      } catch (e) {
        chartData = { error: 'Chart failed to load' };
      }
      const chartArea = document.getElementById('chartArea');
      if (chartData.error || !chartData.points || chartData.points.length === 0) {
        chartArea.innerHTML = `
          <div class="chart-panel">
            <div class="chart-title">📈 ${ticker} Price Chart</div>
            <div class="loading" style="margin-top:32px;">No chart data available for this stock and range.</div>
          </div>
        `;
        return;
      }
      // Get dashboard data for rating class
      if (!dashboardData) dashboardData = await loadDashboard();
      const stockData = dashboardData[ticker];
      const ratingClass =
        stockData && stockData.rating && stockData.rating.rating.includes('BUY') ? 'buy' :
        stockData && stockData.rating && stockData.rating.rating.includes('SELL') ? 'sell' : 'hold';
      chartArea.innerHTML = `
        <div class="chart-panel">
          <div class="chart-title">📈 ${ticker} Price Chart</div>
          <div class="chart-range-controls" style="margin-bottom:10px;">
            <button class="range-btn" data-range="7d">7D</button>
            <button class="range-btn" data-range="1m">1M</button>
            <button class="range-btn" data-range="3m">3M</button>
          </div>
          <div class="chart-container">
            <canvas id="mainChart"></canvas>
          </div>
        </div>
      `;
      // Highlight active range button and set event listeners
      requestAnimationFrame(() => {
        document.querySelectorAll('.range-btn').forEach(btn => {
          btn.classList.toggle('active', btn.getAttribute('data-range') === range);
          btn.onclick = async function() {
            if (range !== this.getAttribute('data-range')) {
              await showChartWithRange(ticker, this.getAttribute('data-range'));
            }
          };
        });
      });
      const labels = chartData.points.map(point => point.time);
      const prices = chartData.points.map(point => point.price);
      const canvas = document.getElementById('mainChart');
      createChart(ticker, canvas, labels, prices, ratingClass);
    }

    async function showNews(ticker) {
      const newsArea = document.getElementById('newsArea');
      newsArea.innerHTML = `
        <div class="news-panel">
          <div class="news-title">📰 ${ticker} News</div>
          <div class="loading">⏳ Loading news...</div>
        </div>
      `;
      let newsData;
      try {
        newsData = await loadNews(ticker);
      } catch (e) {
        newsData = { error: 'News failed to load' };
      }
      if (newsData.error || !newsData.articles) {
        newsArea.innerHTML = `
          <div class="news-panel">
            <div class="news-title">📰 ${ticker} News</div>
            <div class="news-summary">No news data available.</div>
          </div>
        `;
      } else {
        newsArea.innerHTML = `
          <div class="news-panel">
            <div class="news-title">📰 ${ticker} News</div>
            <div class="news-summary">${newsData.summary}</div>
            ${newsData.articles.map(article => `
              <div class="news-item">
                <a class="news-link" href="${article.url}" target="_blank" rel="noopener noreferrer">
                  ${article.title}
                </a>
                <div class="news-meta">
                  ${article.source} • ${article.publishedAt ? new Date(article.publishedAt).toLocaleString() : 'Unknown time'}
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
    }

    async function refreshSelectedStock() {
      if (!selectedTicker) return;
      await showChartWithRange(selectedTicker, '7d');
      await showNews(selectedTicker);
    }

    async function loadPortfolio() {
      if (isLoading) return;
      isLoading = true;
      const refreshBtn = document.getElementById('refreshBtn');
      refreshBtn.disabled = true;
      refreshBtn.textContent = '⏳ Loading...';
      const portfolioDiv = document.getElementById('portfolio');
      portfolioDiv.innerHTML = '';
      try {
        const results = await loadDashboard();
        dashboardData = results;
        if (!results) {
          portfolioDiv.innerHTML = '';
          return;
        }
        let html = '<div class="portfolio-grid" style="gap:32px 24px;">';
        // Only show selected stock if any
        if (selectedTicker && results[selectedTicker]) {
          const data = results[selectedTicker];
          const ratingClass =
            data.rating.rating.includes('BUY') ? 'buy' :
            data.rating.rating.includes('SELL') ? 'sell' : 'hold';
          html += `
            <div class="stock-card ${ratingClass}" id="card-${selectedTicker}" onclick="showChart('${selectedTicker}')">
              <div class="ticker">${selectedTicker}</div>
              <div class="price">$${data.price}</div>
              <div class="confidence">
                ${data.rating.rating} (${data.rating.confidence})
              </div>
              <div class="meta">Shares: ${data.portfolio.shares}</div>
              <div class="meta">Cost Basis: $${data.portfolio.costPerShare}</div>
              <div class="meta">P&L: ${data.portfolio.pnlPercent}%</div>
              <div class="reasons">
                ${data.rating.reasons.map(reason => `<div class="reason">${reason}</div>`).join('')}
              </div>
            </div>
          `;
        }
        html += '</div>';
        portfolioDiv.innerHTML = html;
      } catch (err) {
        portfolioDiv.innerHTML = '';
      } finally {
        isLoading = false;
        refreshBtn.disabled = false;
        refreshBtn.textContent = '🔄 Refresh Ratings';
      }
    }

    function toggleTheme() {
      isDark = !isDark;
      document.body.classList.toggle('light-mode', !isDark);

      if (selectedTicker && chartInstance) {
        showChart(selectedTicker);
      }
    }

    // On load, show landing only
    document.getElementById('portfolio').style.display = 'none';
    document.getElementById('chartArea').style.display = 'none';
    document.getElementById('newsArea').style.display = 'none';
    // Only show portfolio/news/chart after a stock is selected
    // When a stock is selected, call showChart(ticker)
  </script>
</body>
</html>
